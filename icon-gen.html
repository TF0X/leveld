<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>leveld icon generator</title>
<style>
  body { background:#060810; color:#fff; font-family:monospace; padding:24px; display:flex; flex-direction:column; gap:16px; align-items:flex-start; }
  canvas { border-radius:22px; }
  button { background:#b366ff; color:#fff; border:none; padding:8px 18px; border-radius:8px; cursor:pointer; font-size:13px; }
  button:hover { background:#00f59b; color:#060810; }
  .row { display:flex; gap:16px; align-items:center; }
</style>
</head>
<body>
<h2 style="margin:0 0 4px">leveld — icon generator</h2>
<p style="color:#888;margin:0 0 16px;font-size:13px">Generates PNG icons matching the current SVG design. Open in Chrome/Edge.</p>

<div class="row">
  <canvas id="c512" width="512" height="512"></canvas>
  <canvas id="c192" width="192" height="192"></canvas>
</div>
<div class="row">
  <button onclick="dl('c512','icon-512.png')">Download icon-512.png</button>
  <button onclick="dl('c192','icon-192.png')">Download icon-192.png</button>
</div>

<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  const r = s * 0.211; // corner radius ~108/512

  // Rounded rect clip
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.clip();

  // Background radial gradient
  const bgGrad = ctx.createRadialGradient(s*0.38, s*0.37, 0, s*0.38, s*0.37, s*0.65);
  bgGrad.addColorStop(0, '#12103a');
  bgGrad.addColorStop(1, '#060810');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, s, s);

  // Ambient purple blob
  const blob1 = ctx.createRadialGradient(s*0.34, s*0.38, 0, s*0.34, s*0.38, s*0.28);
  blob1.addColorStop(0, 'rgba(98,114,245,0.18)');
  blob1.addColorStop(1, 'rgba(98,114,245,0)');
  ctx.fillStyle = blob1;
  ctx.fillRect(0, 0, s, s);

  // Ambient green blob
  const blob2 = ctx.createRadialGradient(s*0.68, s*0.66, 0, s*0.68, s*0.66, s*0.24);
  blob2.addColorStop(0, 'rgba(0,245,155,0.13)');
  blob2.addColorStop(1, 'rgba(0,245,155,0)');
  ctx.fillStyle = blob2;
  ctx.fillRect(0, 0, s, s);

  // Main gradient (purple→green, used for arrow + bar)
  function accentGrad(x1, y1, x2, y2) {
    const g = ctx.createLinearGradient(x1, y1, x2, y2);
    g.addColorStop(0, '#b366ff');
    g.addColorStop(1, '#00f59b');
    return g;
  }

  // Arrow glow bloom (soft purple blurred triangle)
  ctx.save();
  ctx.filter = `blur(${s * 0.042}px)`;
  ctx.beginPath();
  ctx.moveTo(s * 0.5, s * 0.203);
  ctx.lineTo(s * 0.297, s * 0.527);
  ctx.lineTo(s * 0.703, s * 0.527);
  ctx.closePath();
  ctx.fillStyle = 'rgba(179,102,255,0.28)';
  ctx.fill();
  ctx.filter = 'none';
  ctx.restore();

  // Arrowhead (solid triangle, purple→green L→R)
  ctx.beginPath();
  ctx.moveTo(s * 0.5,   s * 0.203);
  ctx.lineTo(s * 0.297, s * 0.527);
  ctx.lineTo(s * 0.703, s * 0.527);
  ctx.closePath();
  ctx.fillStyle = accentGrad(s * 0.297, 0, s * 0.703, 0);
  ctx.fill();

  // Arrow shaft (rect, purple→green bottom→top)
  const shaftX = s * 0.438;
  const shaftY = s * 0.469;
  const shaftW = s * 0.121;
  const shaftH = s * 0.305;
  const shaftR = s * 0.031;
  ctx.fillStyle = accentGrad(0, shaftY + shaftH, 0, shaftY);
  roundRect(ctx, shaftX, shaftY, shaftW, shaftH, shaftR);
  ctx.fill();

  // XP bar track
  const barX = s * 0.215, barY = s * 0.844, barW = s * 0.57, barH = s * 0.047, barR = s * 0.023;
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  roundRect(ctx, barX, barY, barW, barH, barR);
  ctx.fill();

  // XP bar fill (~74%)
  ctx.fillStyle = accentGrad(barX, 0, barX + barW, 0);
  roundRect(ctx, barX, barY, barW * 0.74, barH, barR);
  ctx.fill();

  // Top shine
  const shineGrad = ctx.createLinearGradient(0, 0, 0, s * 0.22);
  shineGrad.addColorStop(0, 'rgba(255,255,255,0.04)');
  shineGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = shineGrad;
  ctx.fillRect(0, 0, s, s * 0.22);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function dl(id, name) {
  const a = document.createElement('a');
  a.download = name;
  a.href = document.getElementById(id).toDataURL('image/png');
  a.click();
}

drawIcon(document.getElementById('c512'));
drawIcon(document.getElementById('c192'));
</script>
</body>
</html>
