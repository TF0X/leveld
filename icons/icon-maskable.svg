<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable: full bleed bg, content within inner 80% (safe zone ~52px padding each side) -->
  <defs>
    <radialGradient id="bg-glow" cx="40%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#12103a"/>
      <stop offset="100%" stop-color="#060810"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#b366ff"/>
      <stop offset="100%" stop-color="#00f59b"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#b366ff"/>
      <stop offset="100%" stop-color="#00f59b"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Full-bleed background (required for maskable) -->
  <rect width="512" height="512" fill="url(#bg-glow)"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="175" cy="195" rx="125" ry="105" fill="#6272f5" opacity="0.10"/>
  <ellipse cx="345" cy="335" rx="105" ry="88" fill="#00f59b" opacity="0.07"/>

  <!-- Arrow glow bloom (content in safe zone: ~77–435px) -->
  <polygon points="256,118 158,272 354,272" fill="#b366ff" opacity="0.20" filter="url(#glow)"/>

  <!-- Shaft -->
  <rect x="229" y="250" width="54" height="148" rx="14" fill="url(#accent2)"/>

  <!-- Arrowhead -->
  <polygon points="256,118 158,272 354,272" fill="url(#accent)"/>

  <!-- XP bar -->
  <rect x="120" y="416" width="272" height="22" rx="11" fill="rgba(255,255,255,0.06)"/>
  <rect x="120" y="416" width="200" height="22" rx="11" fill="url(#accent)"/>
</svg>
