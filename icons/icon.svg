<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg-glow" cx="40%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#12103a"/>
      <stop offset="100%" stop-color="#060810"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#b366ff"/>
      <stop offset="100%" stop-color="#00f59b"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#b366ff"/>
      <stop offset="100%" stop-color="#00f59b"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="round">
      <rect width="512" height="512" rx="108"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg-glow)"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="175" cy="190" rx="130" ry="110" fill="#6272f5" opacity="0.10" clip-path="url(#round)"/>
  <ellipse cx="340" cy="340" rx="110" ry="90" fill="#00f59b" opacity="0.07" clip-path="url(#round)"/>

  <!-- Arrow glow bloom -->
  <polygon points="256,104 156,262 356,262" fill="#b366ff" opacity="0.22" filter="url(#glow)" clip-path="url(#round)"/>

  <!-- Upward arrow shaft -->
  <rect x="225" y="240" width="62" height="160" rx="16" fill="url(#accent2)"/>

  <!-- Arrowhead -->
  <polygon points="256,104 152,268 360,268" fill="url(#accent)"/>

  <!-- XP bar track -->
  <rect x="110" y="432" width="292" height="24" rx="12" fill="rgba(255,255,255,0.06)"/>
  <!-- XP bar fill (~75%) -->
  <rect x="110" y="432" width="218" height="24" rx="12" fill="url(#accent)"/>

  <!-- Subtle top shine -->
  <rect x="0" y="0" width="512" height="120" rx="108" fill="rgba(255,255,255,0.025)" clip-path="url(#round)"/>
</svg>
